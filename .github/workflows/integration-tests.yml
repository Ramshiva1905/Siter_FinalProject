name: Integration Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boxinator_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Install root dependencies
      run: npm install
    
    - name: Install backend dependencies
      working-directory: ./server
      run: npm install
    
    - name: Install frontend dependencies
      working-directory: ./client
      run: npm install
    
    - name: Setup database for testing
      working-directory: ./server
      run: npx prisma migrate deploy
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/boxinator_test
    
    - name: Run backend tests
      working-directory: ./server
      run: npm test -- --watchAll=false --passWithNoTests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/boxinator_test
    
    - name: Run frontend build check
      working-directory: ./client
      run: npm run build
      env:
        REACT_APP_API_URL: http://localhost:3001
        CI: true
    
    - name: Code coverage report
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/coverage-final.json
        fail_ci_if_error: false

  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Security scanning for backend
      working-directory: ./server
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Security scanning for frontend
      working-directory: ./client
      run: npm audit --audit-level=moderate
      continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install && cd server && npm install && cd ../client && npm install
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      continue-on-error: true
